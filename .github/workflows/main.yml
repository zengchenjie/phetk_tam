# This is a GitHub Action workflow to automatically sync a fork with its upstream repository.

name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'  # This runs the job every hour. You can change this.
  workflow_dispatch:      # This allows you to run the workflow manually from the Actions tab.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          # We need to fetch all history and branches.
          fetch-depth: 0 
          # This is your personal access token, which is required to push changes back to your fork.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Add upstream remote and fetch
        run: |
          # Replace this URL with the URL of the original repository.
          git remote add upstream https://github.com/nhgritctran/PheTK.git
          git fetch upstream

      - name: Merge changes from upstream/main
        run: |
          # This assumes the default branch is 'main'. Change to 'master' or another branch name if needed.
          git checkout main
          git merge upstream/main
      
      - name: Push changes to your fork
        run: |
          # This will push the updates to your fork on GitHub.
          git push origin main
