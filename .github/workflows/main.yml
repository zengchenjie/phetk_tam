name: Sync Fork (Safe FF)

on:
  schedule:
    # Runs daily at 00:00 UTC.
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Create this secret with a fine-grained PAT that has Contents: Read & write.
          # If upstream updates workflow files, include Workflows: Read & write too.
          token: ${{ secrets.FORK_SYNC_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync main from upstream (fast-forward only)
        shell: bash
        run: |
          set -euo pipefail

          git remote add upstream https://github.com/nhgritctran/PheTK.git
          git fetch upstream main

          git checkout main
          # Safe sync: only advances fork if it can be fast-forwarded.
          # This avoids destructive force-pushes.
          git merge --ff-only upstream/main

      - name: Push updated main
        run: git push origin main
